<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/styles/style.css">
</head>

<body>
    <div class="container">
        <div id="addTudoContainer">
            <form id="addTudoForm">
                <div class="closeButtonDiv">
                    <button id="closeAddSection">&#10006;</button>
                </div>
                <input type="text" id="name" placeholder="Name">
                <input type="number" id="number" min="1" max="5" placeholder="Importance">
                <div class="date">
                    <label for="startDate">Start Date</label> <input type="date" id="startDate"
                        placeholder="Start Date">
                </div>
                <div class="date">
                    <label for="endDate">End Date</label> <input type="date" id="endDate" placeholder="End Date">
                </div>


                <textarea cols="30" rows="10" id="desc">Description</textarea>
                <input type="button" value="ADD" id="add">
            </form>
        </div>
        <div id="openTodoContainer">
            <div id="openTodo">
                <div class="closeButtonDiv">
                    <button id="closeOpenTodoSection">&#10006;</button>
                </div>
                <h1></h1>
                <h3></h3>
                <h4></h4>
                <p></p>
            </div>
        </div>


        <header class="header">
            <div class="name">TODO</div>
            <button id="addTodoButton">+ Add todo</button>
        </header>
        <main class="main">
            <section class="controlButtons">
                <button id="sortedBy">Sorted by &#8628;
                    <div class="dropdown-content">
                        <a id="sortedAZ">A-Z</a>
                        <a id="sortedStart">Start date</a>
                        <a id="sortedEnd">End date</a>
                        <a id="sortedimp">Importance</a>
                    </div>
                </button>
                <div class="clearButtons">
                    <button id="clearChecked">Clear checked</button>
                    <button id="clearAll">Clear all</button>
                </div>
            </section>
            <section id="todos"></section>
        </main>
    </div>

    <script src="./public/scripts/script.js"></script>
</body>

</html>
